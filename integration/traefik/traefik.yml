api:
  insecure: true
  dashboard: true

ping: {}

metrics:
  prometheus:
    entryPoint: metrics

log:
  level: DEBUG

entryPoints:
  http:
    address: ":80"
  https:
    address: ":443"
  metrics:
    address: ":8082"

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true
  consulCatalog:
    endpoint:
      address: consul:8500
      scheme: http
    exposedByDefault: false
    watch: true
    refreshInterval: 1s
    defaultRule: "Host(`{{ .Name }}.localhost`)"
    strictChecks:
      - "passing"
      - "warning"

serversTransport:
  forwardingTimeouts:
    dialTimeout: 1s
    responseHeaderTimeout: 60s
