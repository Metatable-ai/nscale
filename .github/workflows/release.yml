name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: nscale-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: nscale-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: nscale-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: nscale-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/nscale ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum nscale-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            nscale-*
            checksums.txt
          body: |
            ## Installation

            Download the appropriate binary for your platform and make it executable:

            ```bash
            # Example for Linux AMD64
            curl -LO https://github.com/Metatable-ai/nomad_scale_to_zero/releases/download/${{ steps.version.outputs.VERSION }}/nscale-linux-amd64
            chmod +x nscale-linux-amd64
            ./nscale-linux-amd64
            ```

            Verify checksums after download:
            ```bash
            sha256sum -c checksums.txt
            ```

            ## Docker

            ```bash
            docker pull ghcr.io/metatable-ai/nscale:${{ steps.version.outputs.VERSION }}
            ```

            ## Documentation

            - [README.md](https://github.com/Metatable-ai/nomad_scale_to_zero/blob/${{ steps.version.outputs.VERSION }}/README.md)
            - [CHANGELOG.md](https://github.com/Metatable-ai/nomad_scale_to_zero/blob/${{ steps.version.outputs.VERSION }}/CHANGELOG.md)
            - [CONTRIBUTING.md](https://github.com/Metatable-ai/nomad_scale_to_zero/blob/${{ steps.version.outputs.VERSION }}/CONTRIBUTING.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
